# Blueprint Render: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: isi-plaza-admin
    runtime: docker
    plan: free
    branch: main
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: APP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: isi-plaza-db
          property: connectionString
      - key: APP_URL
        sync: false
    buildFilter:
      paths:
        - "**"

databases:
  - name: isi-plaza-db
    plan: free
    databaseName: isi_plaza
    user: isi_plaza
